<!DOCTYPE html>
<html lang="zh-CN" data-theme="light"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palantir知识联邦</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont/style.css" media="print" onload="this.media='all'">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8FAFC;--card:#FFFFFF;--card-hover:#F1F5F9;--border:rgba(15,23,42,0.08);
  --text:#0F172A;--muted:#475569;--accent:#0EA5E9;--accent-soft:rgba(14,165,233,0.08);
  --sidebar-bg:#FFFFFF;--input-bg:#F1F5F9;--shadow:0 4px 24px rgba(0,0,0,0.06);
  --thumb-placeholder:#E2E8F0;--scrollbar-track:#F1F5F9;--scrollbar-thumb:#CBD5E1;
  --chip-bc:rgba(14,165,233,0.1);--chip-tc:rgba(139,92,246,0.1);--chip-pc:rgba(16,185,129,0.1);--chip-ic:rgba(249,115,22,0.1);
  --chip-bc-text:#0EA5E9;--chip-tc-text:#8B5CF6;--chip-pc-text:#10B981;--chip-ic-text:#F97316;
  --chip-bc-border:rgba(14,165,233,0.25);--chip-tc-border:rgba(139,92,246,0.25);--chip-pc-border:rgba(16,185,129,0.25);--chip-ic-border:rgba(249,115,22,0.25);
}
[data-theme="dark"]{
  --bg:#0F172A;--card:#1E293B;--card-hover:#334155;--border:rgba(255,255,255,0.08);
  --text:#F8FAFC;--muted:#94A3B8;--accent:#38BDF8;--accent-soft:rgba(56,189,248,0.12);
  --sidebar-bg:#1E293B;--input-bg:#0F172A;--shadow:0 4px 24px rgba(0,0,0,0.3);
  --thumb-placeholder:#334155;--scrollbar-track:#0F172A;--scrollbar-thumb:#334155;
  --chip-bc:rgba(56,189,248,0.15);--chip-tc:rgba(167,139,250,0.15);--chip-pc:rgba(52,211,153,0.15);--chip-ic:rgba(251,146,60,0.15);
  --chip-bc-text:#38BDF8;--chip-tc-text:#A78BFA;--chip-pc-text:#34D399;--chip-ic-text:#FB923C;
  --chip-bc-border:rgba(56,189,248,0.3);--chip-tc-border:rgba(167,139,250,0.3);--chip-pc-border:rgba(52,211,153,0.3);--chip-ic-border:rgba(251,146,60,0.3);
}
body{font-family:'Outfit','LXGW WenKai Screen','STKaiti','Kaiti SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background 0.3s,color 0.3s}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--scrollbar-track)}::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px}
header{background:var(--sidebar-bg);padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
header h1{font-size:1.35em;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.header-right{display:flex;align-items:center;gap:10px}
.toggle-group{display:flex;align-items:center;gap:4px;background:var(--input-bg);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.toggle-group span{font-size:.8em;color:var(--muted);cursor:pointer;user-select:none;transition:color 0.2s;padding:2px 6px;border-radius:12px}
.toggle-group span.active{color:var(--accent);font-weight:600;background:var(--accent-soft)}
.toggle-group .sep{color:var(--border);cursor:default;padding:0}
.theme-btn{background:var(--input-bg);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.05em;color:var(--text);transition:all 0.2s}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.sync-btn{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;height:34px;padding:0 12px;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.82em;color:var(--text);transition:all 0.2s;white-space:nowrap}
.sync-btn:hover{border-color:var(--accent);color:var(--accent)}
.sync-btn .sync-icon{font-size:1.1em;line-height:1}
.sync-btn.spinning .sync-icon{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.sync-panel{position:fixed;top:60px;right:20px;width:380px;max-width:calc(100vw - 40px);max-height:70vh;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);z-index:200;display:none;flex-direction:column;overflow:hidden}
.sync-panel.show{display:flex}
.sync-panel-head{padding:14px 18px;border-bottom:1px solid var(--border);font-weight:600;font-size:1em;display:flex;align-items:center;justify-content:space-between}
.sync-panel-body{padding:14px 18px;overflow-y:auto;flex:1}
.sync-source{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.sync-source:last-child{border-bottom:none}
.sync-source input{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.sync-source-info{flex:1}
.sync-source-name{font-weight:600;font-size:.95em}
.sync-source-meta{font-size:.78em;color:var(--muted);margin-top:2px}
.sync-source.disabled{opacity:0.4;cursor:not-allowed}
.sync-actions{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px}
.sync-actions button{flex:1;padding:9px 14px;border-radius:8px;border:1px solid var(--border);font-size:.88em;cursor:pointer;transition:all 0.15s;background:var(--card);color:var(--text)}
.sync-actions .sync-run{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.sync-actions .sync-run:hover{filter:brightness(1.1)}
.sync-actions .sync-run:disabled{opacity:0.5;cursor:not-allowed;filter:none}
.sync-actions .sync-cancel:hover{border-color:var(--accent);color:var(--accent)}
.sync-log{margin-top:10px;max-height:200px;overflow-y:auto;background:var(--input-bg);border-radius:8px;padding:10px 12px;font-family:'SF Mono','Monaco','Consolas',monospace;font-size:.76em;line-height:1.6;display:none}
.sync-log.show{display:block}
.sync-log .log-line{white-space:pre-wrap;word-break:break-all;color:var(--muted)}
.sync-log .log-line.error{color:#ef4444}
.sync-log .log-line.done{color:var(--accent);font-weight:600}
.sync-translate-opt{display:flex;align-items:center;gap:8px;padding:10px 0;font-size:.85em;color:var(--muted);cursor:pointer;user-select:none}
.sync-translate-opt input{width:16px;height:16px;accent-color:var(--accent)}
.sync-toast{position:fixed;bottom:24px;right:24px;z-index:300;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.12);padding:0;overflow:hidden;transform:translateX(420px);opacity:0;transition:transform 0.35s cubic-bezier(0.22,1,0.36,1),opacity 0.35s;pointer-events:none}
.sync-toast.show{transform:translateX(0);opacity:1;pointer-events:auto}
.sync-toast-bar{height:4px;background:var(--accent);transform-origin:left;animation:toastBar 1.8s ease-out forwards}
.sync-toast.info .sync-toast-bar{background:var(--accent)}
.sync-toast.done .sync-toast-bar{background:#10B981}
.sync-toast.error .sync-toast-bar{background:#ef4444}
@keyframes toastBar{from{transform:scaleX(1)}to{transform:scaleX(0)}}
.sync-toast-body{padding:14px 18px}
.sync-toast-title{font-weight:600;font-size:.95em;display:flex;align-items:center;gap:8px}
.sync-toast-title .toast-icon{font-size:1.15em}
.sync-toast-msg{font-size:.82em;color:var(--muted);margin-top:4px;line-height:1.5}
.sync-toast-actions{margin-top:10px;display:flex;gap:8px}
.sync-toast-actions button{padding:6px 14px;border-radius:6px;border:1px solid var(--border);font-size:.8em;cursor:pointer;background:var(--card);color:var(--text);transition:all 0.15s}
.sync-toast-actions button:hover{border-color:var(--accent);color:var(--accent)}
.sync-toast-actions .toast-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.sync-badge{position:absolute;top:-6px;right:-6px;width:8px;height:8px;border-radius:50%;background:var(--accent);display:none}
.sync-badge.active{display:block;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(14,165,233,0.4)}50%{opacity:0.6;box-shadow:0 0 0 6px rgba(14,165,233,0)}}
.sync-btn{position:relative}
.review-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.review-modal.show{display:flex}
.review-modal-inner{background:var(--card);border-radius:16px;width:90%;max-width:900px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.2)}
.review-modal-head{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.review-modal-head h2{font-size:1.15em;font-weight:700;color:var(--text)}
.review-modal-head .review-count{font-size:.82em;color:var(--muted);margin-left:8px}
.review-modal-body{overflow-y:auto;flex:1;padding:16px 24px}
.review-modal-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.review-batch-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);font-size:.85em;cursor:pointer;background:var(--card);color:var(--text);transition:all 0.15s;white-space:nowrap}
.review-batch-btn:hover{border-color:var(--accent);color:var(--accent)}
.review-batch-btn.all-approve{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.review-card{display:flex;gap:12px;padding:14px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;background:var(--card);transition:border-color 0.15s}
.review-card:hover{border-color:var(--accent)}
.review-card-thumb{width:100px;height:60px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--thumb-placeholder)}
.review-card-thumb img{width:100%;height:100%;object-fit:cover}
.review-card-info{flex:1;min-width:0}
.review-card-title{font-size:.92em;font-weight:600;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.review-card-url{font-size:.76em;color:var(--muted);word-break:break-all}
.review-card-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.review-card-actions button{padding:6px 12px;border-radius:6px;border:1px solid var(--border);font-size:.78em;cursor:pointer;background:var(--card);color:var(--text);transition:all 0.12s;white-space:nowrap}
.review-card-actions .ra-approve:hover{border-color:#10B981;color:#10B981}
.review-card-actions .ra-exclude:hover{border-color:#f59e0b;color:#f59e0b}
.review-card-actions .ra-delete:hover{border-color:#ef4444;color:#ef4444}
.review-card.removing{opacity:0.4;pointer-events:none}
.review-card.approved{border-color:#10B981;background:rgba(16,185,129,0.05)}
.review-card.excluded{border-color:#f59e0b;background:rgba(245,158,11,0.05)}
.review-card.deleted{border-color:#ef4444;background:rgba(239,68,68,0.05)}
.review-empty{padding:40px;text-align:center;color:var(--muted);font-size:.9em}
.layout{display:flex;max-width:1700px;margin:0 auto}
.sidebar{width:280px;min-width:200px;max-width:500px;border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.sidebar-resizer{width:6px;min-width:6px;cursor:col-resize;background:transparent;position:sticky;top:57px;height:calc(100vh - 57px);flex-shrink:0;transition:background 0.15s}
.sidebar-resizer:hover,.sidebar-resizer.dragging{background:var(--accent)}
.acc-section{margin-bottom:4px}
.source-body{padding-left:0}

.tag.sub{margin-left:40px}
.source-group{margin-bottom:12px}
.source-header{font-size:1.15em;font-weight:700;color:var(--text);padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);margin-bottom:4px;display:flex;align-items:center;cursor:pointer;user-select:none;transition:all 0.15s}
.source-header .source-total{margin-left:auto}
.source-header:hover{border-color:var(--accent);color:var(--accent)}
.source-header .source-arrow{display:inline-block;width:0;height:0;border-top:5px solid var(--muted);border-left:4px solid transparent;border-right:4px solid transparent;transition:transform 0.2s;margin-right:8px;flex-shrink:0}
.source-group.collapsed .source-arrow{transform:rotate(-90deg)}
.source-group.collapsed .source-body{display:none}

.source-total{font-size:.9em;color:var(--muted);font-weight:400}
.tag-bar{display:none}
.tag-bar.expanded{max-height:none;overflow:visible}
.tag-bar.has-overflow::after{content:'';position:absolute;right:0;bottom:0;width:80px;height:32px;background:linear-gradient(to right,transparent,var(--bg) 60%);pointer-events:none}
.tag-bar.has-overflow.expanded::after{display:none}
.tag-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:16px;font-size:.82em;cursor:pointer;background:var(--card);border:1px solid var(--border);color:var(--text);transition:all 0.12s;user-select:none;flex-shrink:0}
.tag-pill:hover{border-color:var(--accent);color:var(--accent)}
.tag-pill.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:500}
.tag-pill .pill-count{color:var(--muted);font-size:.85em}
.tag-pill.active .pill-count{color:var(--accent)}
.tag-expand{padding:5px 12px;border-radius:16px;font-size:.82em;cursor:pointer;background:var(--card);border:1px solid var(--border);color:var(--muted);flex-shrink:0;transition:all 0.12s}
.tag-expand:hover{border-color:var(--accent);color:var(--accent)}
.acc-header{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:1.05em;font-weight:600;color:var(--text);background:var(--card);border:1px solid var(--border);transition:all 0.15s;user-select:none;margin-left:20px}
.acc-header:hover{border-color:var(--accent)}
.acc-arrow{display:inline-block;width:0;height:0;border-left:4px solid var(--muted);border-top:4px solid transparent;border-bottom:4px solid transparent;transition:transform 0.2s;flex-shrink:0}
.acc-section.open .acc-arrow{transform:rotate(90deg)}
.acc-header.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.acc-title{flex:1}.acc-count{font-size:.85em;color:var(--muted);font-weight:400}
.acc-body{max-height:0;overflow:hidden;transition:max-height 0.3s ease-out}
.acc-section.open .acc-body{max-height:1000px}
.acc-tags{padding:4px 0 4px 10px}
.tag{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:1.1em;transition:all 0.12s;color:var(--text)}
.tag:hover{background:var(--card)}.tag.active{background:var(--accent-soft);color:var(--accent);font-weight:500}
.tag .count{color:var(--muted);font-size:.9em}.tag.active .count{color:var(--accent)}
.tag.sub{padding:4px 10px 4px 24px;font-size:1.0em;color:var(--muted)}
.tag.sub:hover{color:var(--text)}
.tag.sub.active{color:var(--accent)}
.main{flex:1;padding:20px 24px;min-width:0}
.toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.92em;font-family:inherit;transition:border-color 0.2s}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1em}
.toolbar select{padding:8px 28px 8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.84em;font-family:inherit;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%2394A3B8' fill='none' stroke-width='1.5'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
.toolbar select:focus{outline:none;border-color:var(--accent)}
.filter-btn{display:none;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.84em;font-family:inherit;cursor:pointer;align-items:center;gap:6px}
.filter-btn:hover{border-color:var(--accent)}
.active-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:14px;font-size:.78em;cursor:pointer;transition:opacity 0.15s}
.chip:hover{opacity:0.8}
.chip.bc{background:var(--chip-bc);color:var(--chip-bc-text);border:1px solid var(--chip-bc-border)}
.chip.sc{background:var(--chip-tc);color:var(--chip-tc-text);border:1px solid var(--chip-tc-border)}
.chip.dt{background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s;cursor:pointer}
.card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow)}
.card a{text-decoration:none;color:inherit;display:block}
.card .thumb{width:100%;aspect-ratio:16/9;background:var(--thumb-placeholder);overflow:hidden}
.card .thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s}
.card:hover .thumb img{transform:scale(1.05)}
.card .body{padding:14px}
.card .ttl{font-size:.9em;font-weight:600;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.card .meta{font-size:.76em;color:var(--muted)}
.card .doc-link{display:inline-flex;align-items:center;gap:3px;margin-top:6px;font-size:.76em;color:var(--accent);text-decoration:none}
.card .doc-link:hover{text-decoration:underline}
.load-more{text-align:center;padding:20px}

.source-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.68em;font-weight:600;margin-bottom:4px}
.source-badge.blog{background:rgba(14,165,233,0.12);color:#0EA5E9}
.source-badge.website{background:rgba(139,92,246,0.12);color:#8B5CF6}.source-badge.docs{background:rgba(245,158,11,0.12);color:#F59E0B}




.load-more button{padding:10px 28px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.88em;font-family:inherit;cursor:pointer;transition:all 0.2s}
.load-more button:hover{border-color:var(--accent);color:var(--accent)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
footer{text-align:center;padding:20px;color:var(--muted);border-top:1px solid var(--border);font-size:.8em}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:150}
@media(max-width:900px){
  .sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;z-index:200;transform:translateX(-100%);transition:transform 0.3s ease;padding:20px 16px}
  .sidebar.open{transform:translateX(0)}.sidebar-overlay.show{display:block}
  .layout{flex-direction:column}.main{padding:16px}
  header{padding:14px 16px}header h1{font-size:1.15em}.filter-btn{display:flex}
}

.article-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:300;backdrop-filter:blur(4px)}
.article-modal.show{display:flex;justify-content:center;align-items:flex-start;padding:40px 20px}
.article-modal-inner{background:var(--bg);border-radius:12px;width:100%;max-width:760px;height:calc(100vh - 80px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.article-modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.article-modal-title{font-size:.95em;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:12px}
.article-modal-close{background:var(--input-bg);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1em;color:var(--text);transition:all 0.15s;flex-shrink:0}
.article-modal-close:hover{background:var(--card);transform:scale(1.05)}

<script>
/* Data loaded via fetch from data/index.json */

var I18N={zh:{search_ph:"搜索关键词...",sort_new:"最新优先",sort_old:"最早优先",sort_az:"标题 A-Z",all_years:"所有年份",all_months:"所有月份",blog_cat:"博客分类",sub_cat:"子分类",result_prefix:"共 ",result_suffix:" 篇文章",no_result:"未找到相关文章",filter:"筛选",load_more:"加载更多",months:["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"]},en:{search_ph:"Search keywords...",sort_new:"Newest first",sort_old:"Oldest first",sort_az:"Title A-Z",all_years:"All Years",all_months:"All Months",blog_cat:"Blog Categories",sub_cat:"Subcategories",result_prefix:"Showing ",result_suffix:" articles",no_result:"No articles found",filter:"Filter",load_more:"Load More",months:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]}};


// Load data from index.json, then initialize
var TAG_ZH={"Engineering & Technology": "工程与技术", "Engineering & Tech": "工程与技术", "Palantir AI": "Palantir AI", "Product": "产品", "Privacy & Civil Liberties": "隐私与公民自由", "Palantir Global": "Palantir 全球", "Life at Palantir": "Palantir 生活", "Culture": "企业文化", "Company": "公司", "Frontend Engineering": "前端工程", "Production Infrastructure": "生产基础设施", "Software Supply Chain": "软件供应链", "Information Security": "信息安全", "Foundations": "基础设施", "Foundry Architecture": "Foundry 架构", "Software Engineering": "软件工程", "Git": "Git", "Git Internals": "Git 内部原理", "General": "通用", "Global": "全球", "Kubernetes": "Kubernetes", "Edge Computing": "边缘计算", "Resilience": "系统韧性", "Foundry": "Foundry", "AIP": "AIP", "Apollo": "Apollo", "Ontology": "本体论", "ERP Software": "ERP 软件", "Machine Learning": "机器学习", "RFX Blog Series": "RFX 博客系列", "Privacy": "隐私", "Public Policy": "公共政策", "AI Ethics": "AI 伦理", "Responsible AI": "负责任 AI", "Privacy and Technology": "隐私与技术", "Palantir Explained": "Palantir 解析", "FAQ": "常见问题", "UK": "英国", "Germany": "德国", "France": "法国", "Japan": "日本", "Spanish": "西班牙语", "Internships": "实习项目", "Careers": "招聘", "Team": "团队", "Roles": "职位角色", "Partnerships": "合作伙伴", "Defense": "国防", "Healthcare": "医疗", "Supply Chain": "供应链"};
var I18N={zh:{search_ph:"搜索关键词...",sort_new:"最新优先",sort_old:"最早优先",sort_az:"标题 A-Z",all_years:"所有年份",all_months:"所有月份",blog_cat:"博客分类",sub_cat:"子分类",no_result:"未找到相关文章",filter:"筛选",load_more:"加载更多",months:["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"]},en:{search_ph:"Search keywords...",sort_new:"Newest first",sort_old:"Oldest first",sort_az:"Title A-Z",all_years:"All Years",all_months:"All Months",blog_cat:"Blog Categories",sub_cat:"Subcategories",no_result:"No articles found",filter:"Filter",load_more:"Load More",months:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]}};
var A=[],BC={},SC={},DT={},tagFreq={},CAT_HIERARCHY={},sourceCollapsed={blog:true,website:true,docs:true,video:true,patent:true,contract:true};
fetch('data/index.json').then(function(r){return r.json()}).then(function(idx){
A=idx.articles||[];BC=idx.bc||{};SC=idx.sc||{};DT=idx.dt||{};tagFreq=idx.tag_freq||{};CAT_HIERARCHY=idx.cat_hierarchy||{};
// Auto-detect TAG_ZH from sources if present
if(idx.tag_zh)for(var k in idx.tag_zh)TAG_ZH[k]=idx.tag_zh[k];
initApp();
}).catch(function(e){console.error('Failed to load index.json:',e);document.getElementById('grid').innerHTML='<p style="padding:40px;text-align:center;color:var(--muted)">Failed to load data. If running locally, use a web server.</p>'});

function initApp(){
var lang="zh";var F={bc:new Set(),sc:new Set()};var dateFilter={year:null,month:null};
var accOpen={};var pageSize=24;var currentPage=0;

function t(k){return I18N[lang][k]}
function tt(tag){return lang==="zh"&&TAG_ZH[tag]?TAG_ZH[tag]:tag}

function applyLang(){
document.getElementById("search").placeholder=t("search_ph");
var sb=document.getElementById("sortBy");
sb.options[0].text=t("sort_new");sb.options[1].text=t("sort_old");sb.options[2].text=t("sort_az");
document.getElementById("loadMoreBtn").textContent=t("load_more");
document.querySelectorAll("#langToggle span[data-lang]").forEach(function(s){s.classList.toggle("active",s.dataset.lang===lang)});
buildYearSelect();buildMonthSelect();buildSidebar();buildTagBar();resetPage();render();
}

function applyTheme(theme){document.documentElement.setAttribute("data-theme",theme);document.getElementById("themeBtn").innerHTML=theme==="dark"?"&#9790;":"&#9728;"}

function buildYearSelect(){
var sel=document.getElementById("yearSelect");
var h="<option value=''>"+t("all_years")+"</option>";
var years=Object.keys(DT).sort(function(a,b){return b-a});
for(var i=0;i<years.length;i++){var yr=years[i],yc=0;for(var mo in DT[yr]){yc+=DT[yr][mo]}
var sel2=dateFilter.year===yr?" selected":"";h+="<option value='"+yr+"'"+sel2+">"+yr+" ("+yc+")</option>"}
sel.innerHTML=h;
}

function buildMonthSelect(){
var sel=document.getElementById("monthSelect");
if(!dateFilter.year){sel.innerHTML="<option value=''>"+t("all_months")+"</option>";sel.disabled=true;return}
sel.disabled=false;var h="<option value=''>"+t("all_months")+"</option>";var yr=dateFilter.year;
var months=Object.keys(DT[yr]).sort(function(a,b){return a-b});
for(var j=0;j<months.length;j++){var mo=months[j],sel2=dateFilter.month===mo?" selected":"";h+="<option value='"+mo+"'"+sel2+">"+t("months")[parseInt(mo,10)-1]+" ("+DT[yr][mo]+")</option>"}
sel.innerHTML=h;
}

var SOURCE_META={blog:{name:"Blog",name_zh:"博客"},website:{name:"Website",name_zh:"官网"},docs:{name:"Docs",name_zh:"文档"},video:{name:"Video",name_zh:"视频"},patent:{name:"Patent",name_zh:"专利"},contract:{name:"Contract",name_zh:"合同"}};
var SOURCE_ORDER=["blog","website","docs","video","patent","contract"];

function buildSidebar(){
var sb=document.getElementById("sidebar");var h="";
// Group categories by source
var bySource={};
for(var si=0;si<SOURCE_ORDER.length;si++){
var src=SOURCE_ORDER[si];
bySource[src]={cats:{},total:0};
}
for(var ci=0;ci<A.length;ci++){
var a=A[ci];
var src=a.source||"blog";
if(!bySource[src])bySource[src]={cats:{},total:0};
bySource[src].total++;
for(var cj=0;cj<a.bc.length;cj++){
var cat=a.bc[cj];
bySource[src].cats[cat]=(bySource[src].cats[cat]||0)+1;
}
}
for(var si2=0;si2<SOURCE_ORDER.length;si2++){
var src2=SOURCE_ORDER[si2];
var info=bySource[src2];
var srcTotal=info?info.total:0;if(!info){info={cats:{},total:0};}
var meta=SOURCE_META[src2]||{name:src2,name_zh:src2};
var srcLabel=lang==="zh"?meta.name_zh:meta.name;
h+="<div class='source-group"+(sourceCollapsed[src2]?" collapsed":"")+"' data-source='"+src2+"'><div class='source-header' data-source='"+src2+"'><span class='source-arrow'></span>"+srcLabel+"<span class='source-total'>"+info.total+"</span></div><div class='source-body'>";
var cats=Object.keys(info.cats).sort(function(a,b){return info.cats[b]-info.cats[a]});
for(var ci2=0;ci2<cats.length;ci2++){
var cat=cats[ci2],count=info.cats[cat];
var isOpen=accOpen[cat]===true;
h+="<div class='acc-section"+(isOpen?" open":"")+"' data-cat='"+cat+"'>";
h+="<div class='acc-header"+(F.bc.has(cat)?" active":"")+"' data-cat='"+cat+"'>";
h+="<span class='acc-arrow'></span><span class='acc-title'>"+tt(cat)+"</span><span class='acc-count'>"+count+"</span></div>";
h+="<div class='acc-body'><div class='acc-tags'>";
// No duplicate bc tag - header already shows the category name
// Subcategories
if(SC[cat]){
var subs=Object.keys(SC[cat]).sort(function(a,b){return SC[cat][b]-SC[cat][a]});
for(var si=0;si<subs.length;si++){
var sub=subs[si],sc=SC[cat][sub];
var subKey=cat+"::"+sub;
var sActive=F.sc.has(subKey)?" active":"";
h+="<div class='tag sub"+sActive+"' data-type='sc' data-val='"+subKey+"' data-cat='"+cat+"' data-sub='"+sub+"'><span>"+tt(sub)+"</span><span class='count'>"+sc+"</span></div>";
}
}
h+="</div></div></div>";
}
h+="</div></div>";
}
sb.innerHTML=h;
// Bind source header clicks (collapse/expand)
sb.querySelectorAll(".source-header").forEach(function(el){el.addEventListener("click",function(){
var src=el.dataset.source;
sourceCollapsed[src]=!sourceCollapsed[src];
buildSidebar();
})});
// Bind category header clicks
sb.querySelectorAll(".acc-header").forEach(function(el){el.addEventListener("click",function(){
var cat=el.dataset.cat;
var willOpen=!accOpen[cat];
for(var k in accOpen){accOpen[k]=false}
accOpen[cat]=willOpen;
sb.querySelectorAll(".acc-section").forEach(function(s){s.classList.remove("open")});
sb.querySelectorAll(".acc-header").forEach(function(h){h.classList.remove("active")});
if(willOpen){
el.parentElement.classList.add("open");
el.classList.add("active");
F.bc.clear();F.bc.add(cat);F.sc.clear();
}else{
F.bc.clear();F.sc.clear();
}
resetPage();render();
})});
sb.querySelectorAll(".tag").forEach(function(el){el.addEventListener("click",function(e){e.stopPropagation();var type=el.dataset.type,val=el.dataset.val;
if(type==="bc"){F.bc.clear();F.bc.add(val)}else if(type==="sc"){F.sc.clear();F.sc.add(val)}
buildSidebar();buildTagBar();resetPage();render()})});
}

function getFiltered(){
var q=document.getElementById("search").value.toLowerCase().trim();
return A.filter(function(a){
if(!q)return true;
var title=lang==="zh"?(a.tt||a.t||""):(a.t||"");
if(title.toLowerCase().indexOf(q)>=0)return true;
if((a.ds||"").toLowerCase().indexOf(q)>=0)return true;
if((a.sn||"").toLowerCase().indexOf(q)>=0)return true;
return false;
}).filter(function(a){
if(dateFilter.year){var y=(a.d||"").substring(0,4);if(y!==dateFilter.year)return false;
if(dateFilter.month){var m=(a.d||"").substring(5,7);if(m!==dateFilter.month)return false}}
if(F.bc.size>0){var has=false;a.bc.forEach(function(c){if(F.bc.has(c))has=true});if(!has)return false}
if(F.sc.size>0){var hasSc=false;F.sc.forEach(function(sk){var parts=sk.split("::");var cat=parts[0],sub=parts[1];
var sc=a.sc||{};if(sc[cat]&&sc[cat].indexOf(sub)>=0)hasSc=true});if(!hasSc)return false}
return true;
});
}

function resetPage(){currentPage=0}

function formatDate(d){
if(!d)return"";
if(d.length>=10){var y=d.substring(0,4),mo=parseInt(d.substring(5,7),10)-1,day=d.substring(8,10);
if(lang==="zh")return y+"年"+t("months")[mo]+day+"日";return t("months")[mo]+" "+day+", "+y}
if(d.length>=7){var y2=d.substring(0,4),mo2=parseInt(d.substring(5,7),10)-1;return t("months")[mo2]+" "+y2}
return d;
}

function render(){
var f=getFiltered();var sb=document.getElementById("sortBy").value;
if(sb==="date-desc")f.sort(function(a,b){return(b.d||"").localeCompare(a.d||"")});
else if(sb==="date-asc")f.sort(function(a,b){return(a.d||"").localeCompare(b.d||"")});
else if(sb==="title-asc")f.sort(function(a,b){var ta=lang==="zh"?(a.tt||a.t):(a.t||""),tb=lang==="zh"?(b.tt||b.t):(b.t||"");return ta.localeCompare(tb)});
var afh="";
// Sidebar categories are not shown as chips - they are separate from tags
F.sc.forEach(function(sk){var parts=sk.split("::");afh+="<span class='chip sc' data-type='sc' data-val='"+sk+"'>"+tt(parts[1])+" &times;</span>"});
if(dateFilter.year){var dl=dateFilter.year;if(dateFilter.month)dl=dateFilter.year+" "+t("months")[parseInt(dateFilter.month,10)-1];afh+="<span class='chip dt' id='dateChip'>"+dl+" &times;</span>"}
document.getElementById("af").innerHTML=afh;
document.querySelectorAll("#af .chip").forEach(function(el){el.addEventListener("click",function(){var type=el.dataset.type,val=el.dataset.val;
if(type==="sc"){F.sc.delete(val)}else if(el.id==="dateChip"){dateFilter.year=null;dateFilter.month=null;buildYearSelect();buildMonthSelect()}
buildSidebar();resetPage();render()})});
var visible=f.slice(0,(currentPage+1)*pageSize);
var g=document.getElementById("grid");
if(visible.length===0){g.innerHTML="<div class='empty'>"+t("no_result")+"</div>";document.getElementById("loadMore").style.display="none";return}
var gh="";
for(var i=0;i<visible.length;i++){var a=visible[i];
var title=lang==="zh"?(a.tt||a.t||""):(a.t||"");
var src=a.source||"blog";var srcLabel=src==="blog"?"Blog":src==="docs"?"Docs":"Website";var th=a.th?"<div class='thumb'><img src='"+a.th+"' loading='lazy'></div>":"<div class='thumb'></div>";var dateStr=a.d?formatDate(a.d):(src==="website"||src==="docs"?"归档":"");var docLink=a.du?"<a class='doc-link' href='"+a.du+"' target='_blank' onclick='event.stopPropagation()'>📄 PDF</a>":"";gh+="<div class='card' data-slug='"+a.s+"' data-url='"+a.u+"' data-source='"+(a.source||"blog")+"' style='cursor:pointer'>"+th+"<div class='body'><span class='source-badge "+src+"'>"+srcLabel+"</span><div class='ttl'>"+esc(title)+"</div><div class='meta'>"+dateStr+"</div>"+docLink+"</div></div>"}
g.innerHTML=gh;
var lm=document.getElementById("loadMore");
if(f.length>visible.length){lm.style.display="block"}else{lm.style.display="none"}
}

function esc(s){return(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

document.getElementById("themeBtn").addEventListener("click",function(){var cur=document.documentElement.getAttribute("data-theme");applyTheme(cur==="dark"?"light":"dark")});
document.querySelectorAll("#langToggle span[data-lang]").forEach(function(el){el.addEventListener("click",function(){lang=el.dataset.lang;applyLang()})});
document.getElementById("search").addEventListener("input",function(){resetPage();render()});
document.getElementById("sortBy").addEventListener("change",function(){resetPage();render()});
document.getElementById("yearSelect").addEventListener("change",function(){dateFilter.year=this.value||null;dateFilter.month=null;buildMonthSelect();resetPage();render()});
document.getElementById("monthSelect").addEventListener("change",function(){dateFilter.month=this.value||null;resetPage();render()});
document.getElementById("loadMoreBtn").addEventListener("click",function(){currentPage++;render()});
document.getElementById("sidebarOverlay").addEventListener("click",function(){document.getElementById("sidebar").classList.remove("open");document.getElementById("sidebarOverlay").classList.remove("show")});


// Sidebar resize
(function(){var r=document.getElementById("sidebarResizer"),sb=document.getElementById("sidebar");if(!r||!sb)return;var dragging=false,startX=0,startW=0;
r.addEventListener("mousedown",function(e){dragging=true;startX=e.clientX;startW=sb.offsetWidth;r.classList.add("dragging");document.body.style.cursor="col-resize";document.body.style.userSelect="none";e.preventDefault()});
document.addEventListener("mousemove",function(e){if(!dragging)return;var w=startW+(e.clientX-startX);w=Math.max(200,Math.min(500,w));sb.style.width=w+"px"});
document.addEventListener("mouseup",function(){if(!dragging)return;dragging=false;r.classList.remove("dragging");document.body.style.cursor="";document.body.style.userSelect=""});
})();


// Article modal
var modal=document.getElementById("articleModal"),modalFrame=document.getElementById("modalFrame"),modalTitle=document.getElementById("modalTitle"),modalOrig=document.getElementById("modalOrigLink"),modalClose=document.getElementById("modalClose");
function openArticle(slug,title,url,source){
modalTitle.textContent=title||"";
modalOrig.href=url||"#";
var src=source||"blog";
var path,contentFile;
if(src==="website"||src==="docs"){
contentFile=lang==="zh"?"page_zh.html":"page.html";
path="content/"+src+"/"+slug+"/"+contentFile;
}else{
contentFile=lang==="zh"?"reader_zh.html":"reader.html";
path="articles/"+slug+"/"+contentFile;
}
modalFrame.src=path;
modal.classList.add("show");
document.body.style.overflow="hidden";
}
function closeArticle(){modal.classList.remove("show");modalFrame.src="about:blank";document.body.style.overflow=""}
modalClose.addEventListener("click",closeArticle);
modal.addEventListener("click",function(e){if(e.target===modal)closeArticle()});
document.addEventListener("keydown",function(e){if(e.key==="Escape"&&modal.classList.contains("show"))closeArticle()});
document.getElementById("grid").addEventListener("click",function(e){var card=e.target.closest(".card");if(!card)return;openArticle(card.dataset.slug,card.querySelector(".ttl").textContent,card.dataset.url,card.dataset.source||"blog")});

/* Tag bar: independent from sidebar, shows all tags */
function buildTagBar(){
var tb=document.getElementById("tagBar");if(!tb)return;
var isExpanded=tb.classList.contains("expanded");
var sorted=Object.keys(tagFreq).sort(function(a,b){return tagFreq[b]-tagFreq[a]});
var h="";
for(var i=0;i<sorted.length;i++){
var tag=sorted[i],count=tagFreq[tag];
var parts=tag.split("::");
var display=tt(parts.length>1?parts[1]:tag);
var active=F.sc.has(tag)?" active":"";
h+="<span class='tag-pill"+active+"' data-type='sc' data-val='"+tag+"'>"+display+"<span class='pill-count'>"+count+"</span></span>";
}
h+="<span class='tag-expand' id='tagExpand' style='display:none'>+</span>";
tb.innerHTML=h;
tb.querySelectorAll(".tag-pill").forEach(function(el){el.addEventListener("click",function(){
var val=el.dataset.val;
if(F.sc.has(val)){F.sc.clear()}else{F.sc.clear();F.sc.add(val)}
buildSidebar();buildTagBar();resetPage();render();
})});
if(!isExpanded&&tb.scrollHeight>64){
tb.classList.add("has-overflow");
var exp=document.getElementById("tagExpand");
var visCount=0;
tb.querySelectorAll(".tag-pill").forEach(function(pill){if(pill.offsetTop<64)visCount++});
var hiddenCount=tb.querySelectorAll(".tag-pill").length-visCount;
exp.textContent="+"+hiddenCount;
exp.style.display="inline-flex";
exp.addEventListener("click",function(e){e.stopPropagation();tb.classList.add("expanded");buildTagBar()});
}else if(isExpanded){
var exp=document.getElementById("tagExpand");
exp.textContent="\u2211";
exp.style.display="inline-flex";
exp.addEventListener("click",function(e){e.stopPropagation();tb.classList.remove("expanded");buildTagBar()});
}else{
tb.classList.remove("has-overflow");
var exp2=document.getElementById("tagExpand");
if(exp2)exp2.style.display="none";
}
}

applyTheme("light");applyLang();

// Expose refresh function for the sync module to call after content updates
window.__refreshData=function(newIdx){
A=newIdx.articles||[];BC=newIdx.bc||{};SC=newIdx.sc||{};DT=newIdx.dt||{};tagFreq=newIdx.tag_freq||{};CAT_HIERARCHY=newIdx.cat_hierarchy||{};
if(newIdx.tag_zh)for(var k in newIdx.tag_zh)TAG_ZH[k]=newIdx.tag_zh[k];
buildYearSelect();buildMonthSelect();buildSidebar();buildTagBar();resetPage();render();
};

}

// === Content Update Panel ===
(function(){
var syncBtn=document.getElementById("syncBtn"),syncPanel=document.getElementById("syncPanel");
var syncClose=document.getElementById("syncClose"),syncCancel=document.getElementById("syncCancel");
var syncRun=document.getElementById("syncRun"),syncBody=document.getElementById("syncBody"),syncLog=document.getElementById("syncLog");
var syncTranslate=document.getElementById("syncTranslate"),syncBadge=document.getElementById("syncBadge");
var syncToast=document.getElementById("syncToast"),toastTitle=document.getElementById("toastTitle"),toastMsg=document.getElementById("toastMsg"),toastActions=document.getElementById("toastActions");
var syncBusy=false;

function fmtDate(iso){
if(!iso)return"从未更新";
try{var d=new Date(iso);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}
catch(e){return iso}
}

function loadStatus(){
fetch("/api/status").then(function(r){return r.json()}).then(function(d){
var s=d.sources||{};
var bm=document.getElementById("syncMetaBlog"),wm=document.getElementById("syncMetaWebsite");
if(bm&&s.blog)bm.textContent=s.blog.count+" 篇 · "+fmtDate(s.blog.last_scan);
if(wm&&s.website)wm.textContent=s.website.count+" 篇 · "+fmtDate(s.website.last_scan);
if(d.running){setBusyUI(true)}
else if(!syncBusy){setBusyUI(false)}
}).catch(function(){})
}

function setBusyUI(busy){
syncRun.disabled=busy;
syncRun.textContent=busy?"更新中...":"开始更新";
syncBtn.classList.toggle("spinning",busy);
syncBadge.classList.toggle("active",busy)
}

function togglePanel(show){
syncPanel.classList.toggle("show",show);
if(show)loadStatus()
}

syncBtn.addEventListener("click",function(){togglePanel(!syncPanel.classList.contains("show"))});
syncClose.addEventListener("click",function(){togglePanel(false)});
syncCancel.addEventListener("click",function(){togglePanel(false)});
document.addEventListener("click",function(e){
if(syncPanel.classList.contains("show")&&!syncPanel.contains(e.target)&&!syncBtn.contains(e.target))togglePanel(false)
});

function appendLog(msg,cls){
var div=document.createElement("div");
div.className="log-line"+(cls?" "+cls:"");
div.textContent=msg;
syncLog.appendChild(div);
if(syncPanel.classList.contains("show"))syncLog.classList.add("show");
syncLog.scrollTop=syncLog.scrollHeight
}

function showToast(title,msg,type,actions){
syncToast.className="sync-toast"+(type?" "+type:"");
toastTitle.innerHTML=(type==="done"?"<span class='toast-icon'>&#10003;</span> ":type==="error"?"<span class='toast-icon'>&#9888;</span> ":"<span class='toast-icon'>&#8635;</span> ")+title;
toastMsg.textContent=msg||"";
toastActions.innerHTML="";
if(actions){
for(var i=0;i<actions.length;i++){
var b=document.createElement("button");
if(actions[i].primary)b.className="toast-primary";
b.textContent=actions[i].label;
b.addEventListener("click",actions[i].fn);
toastActions.appendChild(b)
}
}
syncToast.classList.add("show");
// auto-hide info toasts after 4s; done/error stay until dismissed
if(type==="info"&&!actions){
clearTimeout(window._toastTimer);
window._toastTimer=setTimeout(function(){syncToast.classList.remove("show")},4000)
}
}

syncRun.addEventListener("click",function(){
if(syncBusy)return;
var sources=[];
syncBody.querySelectorAll(".sync-source input:checked").forEach(function(cb){sources.push(cb.value)});
if(sources.length===0){appendLog("请至少选择一个栏目","error");return}

syncBusy=true;setBusyUI(true);
syncLog.innerHTML="";syncLog.classList.add("show");
appendLog("正在启动更新...");

var doTranslate=syncTranslate.checked;
var srcLabels=sources.map(function(s){return s==="blog"?"博客":s==="website"?"官网":s}).join("、");

// Close panel immediately, show toast, let update run silently in background
togglePanel(false);
showToast("内容更新已启动","正在更新: "+srcLabels+(doTranslate?"（含翻译）":"")+"，完成后会通知你","info");

fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({sources:sources,translate:doTranslate})
}).then(function(resp){
var reader=resp.body.getReader();var decoder=new TextDecoder();var buffer="";
function pump(){
return reader.read().then(function(result){
if(result.done){finishUpdate();return}
buffer+=decoder.decode(result.value,{stream:true});
var lines=buffer.split("\n");buffer=lines.pop();
for(var i=0;i<lines.length;i++){
var line=lines[i].trim();
if(!line||line.startsWith(":"))continue;
if(line.startsWith("data: ")){
try{var d=JSON.parse(line.slice(6));handleSSE(d)}catch(e){}
}
}
pump()
})
}
return pump()
}).catch(function(e){
appendLog("连接失败: "+e,"error");finishUpdate()
})
});

function handleSSE(d){
var cls="";
if(d.phase&&(d.phase.indexOf("error")>=0||d.phase==="fatal"))cls="error";
if(d.phase==="complete")cls="done";
// Only append to log if panel is open; otherwise stay silent
if(syncPanel.classList.contains("show"))appendLog(d.msg||d.phase||"");
if(d.phase==="complete"&&d.status){
var s=d.status;
var blogC=s.blog?s.blog.count:"?",wsC=s.website?s.website.count:"?";
if(syncPanel.classList.contains("show"))appendLog("博客: "+blogC+" 篇 | 官网: "+wsC+" 篇","done")
}
}

function finishUpdate(){
syncBusy=false;setBusyUI(false);
loadStatus();
// Reload index.json data and refresh UI in place
fetch("data/index.json?_="+Date.now()).then(function(r){return r.json()}).then(function(idx){
if(typeof window.__refreshData==="function"){
window.__refreshData(idx);
var s=idx.sources||{};
var bc=s.blog?s.blog.count:"?",wc=s.website?s.website.count:"?";
var pc=(idx.pending||[]).length;
var actions=[{label:"好的",primary:true,fn:function(){syncToast.classList.remove("show")}}];
if(pc>0){actions.unshift({label:"审阅 "+pc+" 篇新内容",primary:true,fn:function(){syncToast.classList.remove("show");openReview()}})}
showToast("更新完成","博客 "+bc+" 篇 · 官网 "+wc+" 篇，页面已刷新"+(pc>0?"，"+pc+" 篇待审阅":""),"done",actions)
}else{
showToast("更新完成","请刷新页面查看新数据","done",[
{label:"刷新页面",primary:true,fn:function(){window.location.reload()}}
])
}
}).catch(function(){
showToast("更新完成","数据自动刷新失败，请手动刷新","done",[
{label:"刷新页面",primary:true,fn:function(){window.location.reload()}}
])
})
}

// === Pending Review UI ===
var reviewModal=document.getElementById("reviewModal"),reviewBody=document.getElementById("reviewBody"),reviewCount=document.getElementById("reviewCount");
var reviewClose=document.getElementById("reviewClose"),reviewApproveAll=document.getElementById("reviewApproveAll"),reviewExcludeAll=document.getElementById("reviewExcludeAll");
var pendingArticles=[];

function esc2(s){return(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function openReview(){
fetch("/api/pending").then(function(r){return r.json()}).then(function(d){
pendingArticles=d.pending||[];
renderReview();
reviewModal.classList.add("show");
}).catch(function(){showToast("审阅","加载待审内容失败","error")})
}
function closeReview(){reviewModal.classList.remove("show")}
function renderReview(){
if(pendingArticles.length===0){reviewBody.innerHTML="<div class='review-empty'>没有待审阅的内容</div>";reviewCount.textContent="";return}
reviewCount.textContent="共 "+pendingArticles.length+" 篇";
var h="";
for(var i=0;i<pendingArticles.length;i++){var a=pendingArticles[i];var thumb=a.th?"<img src='"+a.th+"' loading='lazy'>":"";
h+="<div class='review-card' data-slug='"+a.s+"'><div class='review-card-thumb'>"+thumb+"</div><div class='review-card-info'><div class='review-card-title'>"+esc2(a.t||a.tt||a.s)+"</div><div class='review-card-url'>"+esc2(a.u||"")+"</div></div><div class='review-card-actions'><button class='ra-approve' data-slug='"+a.s+"' data-action='approve'>保留</button><button class='ra-exclude' data-slug='"+a.s+"' data-action='exclude'>排除</button><button class='ra-delete' data-slug='"+a.s+"' data-action='delete'>删除</button></div></div>"}
reviewBody.innerHTML=h;
reviewBody.querySelectorAll(".review-card-actions button").forEach(function(btn){btn.addEventListener("click",function(){reviewAction(this.dataset.slug,this.dataset.action,this)})})
}
function reviewAction(slug,action,btn){
var card=btn.closest(".review-card");card.classList.add("removing");
fetch("/api/review",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:action,slugs:[slug],source:"website"})}).then(function(r){return r.json()}).then(function(d){
if(d.ok){pendingArticles=pendingArticles.filter(function(a){return a.s!==slug});card.classList.remove("removing");card.classList.add(action==="approve"?"approved":action==="exclude"?"excluded":"deleted");setTimeout(function(){renderReview()},300);fetch("data/index.json?_="+Date.now()).then(function(r){return r.json()}).then(function(idx){if(typeof window.__refreshData==="function")window.__refreshData(idx)})}
else{card.classList.remove("removing");showToast("审阅","操作失败","error")}
}).catch(function(){card.classList.remove("removing");showToast("审阅","网络错误","error")})
}
function reviewBatch(action){
var slugs=pendingArticles.map(function(a){return a.s});if(slugs.length===0)return;
fetch("/api/review",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:action,slugs:slugs,source:"website"})}).then(function(r){return r.json()}).then(function(d){
if(d.ok){pendingArticles=[];renderReview();fetch("data/index.json?_="+Date.now()).then(function(r){return r.json()}).then(function(idx){if(typeof window.__refreshData==="function")window.__refreshData(idx)});showToast("审阅",action==="approve"?"已全部保留":"已全部排除",action==="approve"?"done":"info")}
}).catch(function(){showToast("审阅","批量操作失败","error")})
}
reviewClose.addEventListener("click",closeReview);
reviewModal.addEventListener("click",function(e){if(e.target===reviewModal)closeReview()});
reviewApproveAll.addEventListener("click",function(){reviewBatch("approve")});
reviewExcludeAll.addEventListener("click",function(){reviewBatch("exclude")});
window.__openReview=openReview;

// Initial status load
loadStatus();
// Poll status periodically to detect background runs started elsewhere
setInterval(loadStatus,10000);
})();
</script></body></html>
