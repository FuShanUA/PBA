<section id="journal-body" class="ptcom-design__section__1o9c6nt ptcom-design__sectiondark__1o9c6nt" data-background="dark"><div class="ptcom-design__container__1o9c6nt"><div><div class="ptcom-design__paragraph__du7ili ptcom-design__paragraph300__du7ili ptcom-design__twoParagraph__du7ili"><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><h2>话语场存在断层。</h2><div class="ptcom-design__image__1bamxf7"><div><img src="../images/46bb87a5325a.jpg" srcset="/assets/xrfr7uokpv1b/2zReWOXXpcryeuIsOi05zV/d7eec306c88620fb8a2a121acbf34f3c/Asset_145organic.png?quality=70&amp;width=1600 1600w, /assets/xrfr7uokpv1b/2zReWOXXpcryeuIsOi05zV/d7eec306c88620fb8a2a121acbf34f3c/Asset_145organic.png?quality=70&amp;width=1200 1200w, /assets/xrfr7uokpv1b/2zReWOXXpcryeuIsOi05zV/d7eec306c88620fb8a2a121acbf34f3c/Asset_145organic.png?quality=70&amp;width=1000 1000w, /assets/xrfr7uokpv1b/2zReWOXXpcryeuIsOi05zV/d7eec306c88620fb8a2a121acbf34f3c/Asset_145organic.png?quality=70&amp;width=800 800w, /assets/xrfr7uokpv1b/2zReWOXXpcryeuIsOi05zV/d7eec306c88620fb8a2a121acbf34f3c/Asset_145organic.png?quality=70&amp;width=640 640w, /assets/xrfr7uokpv1b/2zReWOXXpcryeuIsOi05zV/d7eec306c88620fb8a2a121acbf34f3c/Asset_145organic.png?quality=70&amp;width=480 480w" alt="Abstract White Globe" loading="lazy"></div></div></div></div></div><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><h3>太多不该拥有发声平台的人占据着舞台，而本该拥有发声平台的人却无处发声。</h3><h3>我们创办《共和》正是为了扭转这种失衡。</h3><h3>本刊致力于为新颖且反传统的观点提供阵地，以此激发深度思考与真正的思想交锋。</h3></div></div></div></div></div></div></section>
