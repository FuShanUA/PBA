<section id="section5gVeAJaBqPdEfVho0W7Zwx" class="ptcom-design__section__1o9c6nt ptcom-design__sectionlight__1o9c6nt" data-background="light"><div class="ptcom-design__container__1o9c6nt"><div class="ptcom-design__header__15wj5m3 ptcom-design__header400__15wj5m3"><h1 data-testid="heading" data-animation="header" data-rendered-size="400" class="ptcom-design__heading__9pryq9 ptcom-design__heading400__9pryq9" style="opacity: 1;">Palantir Mourns the Loss of Sergio Marchionne</h1></div><article class="ptcom-design__quoteBlock__1qrbfo6 ptcom-design__quoteBlockLeft__1qrbfo6"><div class="ptcom-design__quoteWrap__1qrbfo6"><figure class="ptcom-design__quote__8mtxlm"><svg class="ptcom-design__icon__8mtxlm" width="16" height="14" viewBox="0 0 16 14" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M5.975 0C2.37 0 0 1.975 0 5.63v7.456h5.53V7.012H2.52V5.58c0-1.63.395-3.457 3.456-3.457V0zM16 0c-3.605 0-5.975 1.975-5.975 5.63v7.456h5.481V7.012h-2.963V5.58c0-1.63.395-3.457 3.457-3.457V0z"></path></svg><div class="ptcom-design__quoteWrap__8mtxlm"><blockquote><div class="ptcom-design__text__1nkr7ha"><div><p>All of us at Palantir are deeply saddened by the passing of Sergio Marchionne, a visionary in everything he did and our cherished partner. We will always remember Sergio for his deeply thoughtful approach to the people, technology, and environment of his businesses. Our thoughts are with his family, everyone at FCA, Ferrari and the Exor organization.</p></div></div></blockquote><figcaption class="ptcom-design__citation__8mtxlm"><span aria-hidden="true">↳</span> Dr. Alex Karp, Palantir Technologies CEO</figcaption></div></figure></div></article></div></section>
