<article>
<p>致股东的信</p>
<p>2023年11月2日</p>
<p>I. 我们创造了公司成立二十年来最高的利润。</p>
<p>我们在 2023 年第三季度实现了 7200 万美元的净利润，过去十二个月累计达 1.47 亿美元。</p>
<p>公司从亏损到盈利的迅速反转，印证了我们多年来构建并不断优化的软件平台所具备的强大实力与成熟度。</p>
<p>得益于这些业绩，公司现已具备纳入标普 500 指数的资格。这是我们长期努力的目标，我们也深知这一目标触手可及。</p>
<p>然而，我们对盈利能力的专注，既不会影响我们更为宏大的愿景，也不会妨碍公司整体业务的增长。</p>
<p>我们在 2023 年第三季度实现了 5.58 亿美元的总营收，较去年同期增长 17%。</p>
