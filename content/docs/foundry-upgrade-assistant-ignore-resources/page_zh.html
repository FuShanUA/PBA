<h1 id="user-content-忽略资源" level="1" node="[object Object]" data-pagefind-weight="1"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#忽略资源"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>忽略资源</h1>
<p>升级助手可以配置为忽略资源；被忽略的资源将不包含在活动之中。</p>
<p><img alt="img" height="174" src="/docs/resources/foundry/upgrade-assistant/ignore-resource.png" style="aspect-ratio:1009 / 174" width="1009" node="[object Object]"></p>
<p>忽略资源有两个主要后果：</p>
<ol>
<li>当升级助手跟踪进度时，被忽略的资源将被计为已采取行动的资源，即使实际上并未采取任何行动。这种计算旨在确保进度百分比准确反映仍需要采取行动的资源。</li>
<li>不会向被忽略的资源发送通知。</li>
</ol>
<div class="ptcom-design__callout__19o1cwu ptcom-design__warning__19o1cwu"><svg class="ptcom-design__icon__19o1cwu" width="20" height="20" viewBox="0 0 20 20" role="img" fill="currentColor"><path d="M11,2H9L2,15v2H18V15.5ZM10,15a1,1,0,1,1,1-1A1,1,0,0,1,10,15Zm1-3H9V6h2Z"></path></svg><div class="ptcom-design__title__19o1cwu">警告</div><p>如果在升级助手中忽略了资源，那么在活动期间很可能不会对该资源采取任何操作。因此，被忽略的资源可能在活动截止日期后停止工作，这可能会导致进一步的问题。</p></div>
<p>

<p>忽略资源是一个适用于所有查看被忽略资源的用户的操作。您只有在确定在该活动期间对该资源不应采取任何操作时，才应忽略该资源。</p>
