<div class="ptcom-design__callout__19o1cwu"><svg class="ptcom-design__icon__19o1cwu" width="20" height="20" viewBox="0 0 20 20" role="img" fill="currentColor"><path d="M10,2a8,8,0,1,0,8,8A8,8,0,0,0,10,2Zm1,13H9V10H7V8h4ZM10,7a1,1,0,1,1,1-1A1,1,0,0,1,10,7Z"></path></svg><p>管理代码仓库需要具备相应的权限。默认情况下，大部分设置可由仓库的数据主人调整。其他选项（如代码编辑器偏好设置）则对所有创作者开放。</p></div>
<p>要更改代码仓库的设置，请进入该仓库并在顶部导航栏中选择<strong>设置</strong>。在设置选项卡中，您可以设定个人的编辑器偏好，并配置仓库的各项行为。有关以下设置的更多信息，请参阅相应说明：</p>
