<p>在文档中添加模板输入后，你需要将这些输入连接到支持模板化的组件上。请查阅各个组件的参考文档，详细了解在文档模板中各组件有哪些属性支持模板化。</p>
<p>首先，选中需要连接到模板输入的组件，并在右侧打开组件属性面板。接着，点击 <strong>选择</strong>，选挑一个现有的模板输入或创建一个新输入，即可完成输入与组件的连接。</p>
<p>在下方示例中，一个对象属性组件连接到了已存在的 <code>aircraft_parameter</code> 输入。连接完成后，该对象属性的值将由 <code>aircraft_parameter</code> 配置的预览值驱动。</p>
