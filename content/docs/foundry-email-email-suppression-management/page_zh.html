<p>抑制管理提高了电子邮件发送失败的可解释性。
如 <a href="/docs/foundry/email/overview/">概述</a> 中所述，电子邮件发送可能由于各种原因而失败。
当这些失败重复发生时（例如，收件人的电子邮件服务器不可用），平台或底层电子邮件提供商可能会创建一个“抑制”，这是一种机制，通过该机制，平台在抑制过期或被手动删除之前停止向用户发送电子邮件。</p>
<p>由 <code>BOUNCE</code> 引起的抑制将在 14 天后自动删除，而由用户 <code>COMPLAINT</code> 引起的抑制则需要手动干预才能删除。</p>
<p>我们不建议在未获得收件人明确同意的情况下删除由 <code>COMPLAINT</code> 引起的抑制。这样做可能会影响您的电子邮件发送声誉，并对您的电子邮件送达率产生负面影响。</p>
