<h2 id="user-content-apply-labels-to-teams" level="2" node="[object Object]" data-pagefind-weight="0.9"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#apply-labels-to-teams"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>为团队添加标签</h2>
<p>要为团队添加标签，请导航到 <strong>设置与配置</strong> 页面的 <strong>团队</strong> 选项卡。选择您想要添加标签的团队，然后在右侧面板的 <strong>标签</strong> 部分中选择 <strong>编辑</strong>。</p>
<p><img alt="用于为团队添加标签的“编辑”按钮被突出显示。" height="600" src="/docs/resources/apollo/managing-labels/team-edit-labels.png" style="aspect-ratio:2348 / 1484" width="949.3261455525607" node="[object Object]"></p>
<p>这将打开一个对话框，您可以在此为团队应用和编辑标签。</p>

要为一个团队添加标签，请选择您想要应用的标签ID和值。您也可以在搜索栏中输入标签ID。</p>
<img alt="编辑标签对话框显示您可以应用的可能标签，以及已经应用到团队的标签。" src="/docs/resources/apollo/managing-labels/teams-apply-labels.png?width=500" style="aspect-ratio:998 / 1110" width="500" node="[object Object]">
<p>在“编辑标签”对话框的<strong>已应用标签</strong>部分，您可以查看已应用到团队的标签。要编辑标签，请点击标签右侧的铅笔图标。然后您可以选择另一个与相同标签ID相对应的值进行应用。要删除标签，请点击标签右侧的垃圾桶图标。</p>
<p>完成后，选择<strong>应用</strong>以保存您的更改。</p>
