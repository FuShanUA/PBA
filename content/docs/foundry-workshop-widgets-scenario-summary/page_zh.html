<p>Workshop 中的<strong>场景摘要</strong>微件会显示与所选场景关联的操作列表。配置场景摘要微件的模块构建者可以设置要进行摘要汇总的场景。</p>
<p>用户可以通过<strong>X</strong>按钮移除特定操作，也可以<strong>撤销</strong>对列表的上一步更改，包括恢复此前移除的操作。</p>
