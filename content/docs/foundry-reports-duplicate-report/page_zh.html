<p>与 Palantir Foundry 中的任何资源一样（无论是不是报告），您可以在查看项目中的资源时复制报告：</p>
<ol>
<li>在文件列表中右键点击该报告。</li>
<li>在弹出的上下文菜单中点击<strong>操作</strong>。</li>
<li>点击<strong>复制报告</strong>。</li>
</ol>
