<p>在 Fusion 中使用数据集之前，必须确保已将其索引至 Lime。最简单的操作方式是，通过 Fusion 中“数据”选项卡菜单下的<strong>索引新数据集</strong>功能来完成。下方截图展示了一个美国机场的开源数据集示例。</p>
<p><img alt="sync_new_dataset" height="270" src="/docs/resources/foundry/fusion/sync_new_dataset.png" style="aspect-ratio:1045 / 270" width="1045" node="[object Object]"></p>
<p>在随后弹出的界面中，您可以选择多个数据集（及分支）进行索引。</p>
<p><img alt="select_datasets" height="600" src="/docs/resources/foundry/fusion/select_datasets.png" style="aspect-ratio:1045 / 688" width="911.3372093023256" node="[object Object]"></p>
<p>点击设置菜单下的<strong>已索引数据集</strong>，即可查看 Fusion 中可用数据集的列表及其当前索引状态（<strong>最新</strong>、<strong>同步中</strong>、<strong>已过期</strong>）。</p>
