<h1 id="user-content-add-an-input-sampling-strategy" level="1" node="[object Object]" data-pagefind-weight="1"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#add-an-input-sampling-strategy"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>添加输入采样策略</h1>
<p>如果输入数据集较大，可以通过为这些输入添加采样策略来加快预览速度。</p>
<ol>
<li>右键单击要采样的输入节点，然后在下拉菜单中选择<strong>采样策略</strong>。</li>
</ol>
<img alt="A dropdown menu with the Sampling strategies option." src="/docs/resources/foundry/pipeline-builder/management-sampling-entry-point.png?width=400" style="aspect-ratio:702 / 1006" width="400" node="[object Object]">
<ol start="2">
<li>在采样策略对话框中，选择所需的输入数据集。</li>
</ol>
<img alt="The sampling strategies dialog." src="/docs/resources/foundry/pipeline-builder/management-sampling-dialog.png?width=800" style="aspect-ratio:1464 / 958" width="800" node="[object Object]">
<ol start="3">
<li>选择<strong>百分比</strong>策略，并输入 1 到 100 之间的数字对输入进行降采样。</li>
</ol>
<img alt="The sampling strategies dialog configured to use a 20% strategy. " src="/docs/resources/foundry/pipeline-builder/management-sampling-percentage.png?width=800" style="aspect-ratio:1466 / 952" width="800" node="[object Object]">
<ol start="4">
<li>关闭对话框。此时输入节点右上角会显示一个蓝色徽标，表示已应用采样策略。</li>
</ol>
<img alt="An input node showing a sampling strategies indicator." src="/docs/resources/foundry/pipeline-builder/management-sampling-badge.png?width=400" style="aspect-ratio:558 / 498" width="400" node="[object Object]">
<p>该输入下游任何节点的预览面板也会显示已应用采样的提示。</p>
<img alt="Sampling strategies are applied to downstream inputs." src="/docs/resources/foundry/pipeline-builder/management-sampling-downstream.png?width=800" style="aspect-ratio:2234 / 990" width="800" node="[object Object]">
