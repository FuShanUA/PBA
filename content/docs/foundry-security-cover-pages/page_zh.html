<p>项目<strong>封面页</strong>板块提供基于 Markdown 的富文本编辑器，方便您撰写详尽的项目文档。</p>
<p>建议项目数据主人添加文档来描述项目目标，并引导用户找到相关文件和正在进行的工作领域。此板块还可提供说明，告知新用户应申请哪些群组的访问权限。封面页也可用作项目内应用程序的用户指南。</p>
<p>项目数据主人可将封面页配置为项目组织内所有用户均能发现的状态，即使项目已应用标记也不例外。无权访问项目或其文件的用户依然能够发现并查看项目封面页。对于包含敏感数据和应用的项目而言，此功能非常实用，因为可被发现的封面页能让相关用户找到该项目，并在需要时申请访问权限。</p>
