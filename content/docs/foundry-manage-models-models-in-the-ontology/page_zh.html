<p>在构建操作工作流时，将对象属性绑定至模型输入，并基于本体的视角解析输出结果，进而在本体对象的上下文中执行模型推理，往往大有裨益。例如，您可能需要定义一个由模型驱动的<a href="/docs/foundry/action-types/overview/">动作</a>，或是将 Workshop 中的 UI 元素直接与模型输出相连接。借助<a href="/docs/foundry/functions/functions-on-objects/">对象函数</a>即可实现此类操作，该功能支持调用<a href="/docs/foundry/manage-models/set-up-live/">模型目标实时部署</a>或<a href="/docs/foundry/manage-models/create-a-model-deployment/">模型直接部署</a>。有关代码编写体验的详细信息，请查阅我们的<a href="/docs/foundry/functions/functions-on-models/">《模型函数文档》</a>。</p>
