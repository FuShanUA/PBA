<p>记事本支持创建锚点链接，方便您引用文档中的特定部分。将此链接分享给其他用户，可确保他们访问链接时直接跳转至记事本文档的对应位置。同样，在篇幅较长的文档中，您也可以利用锚点链接生成自定义大纲。</p>
<p>如需复制锚点链接，请将光标移至要引用的内容处，然后在右侧的拖拽手柄菜单中选择<strong>复制锚点链接</strong>。您也可以先选中目标内容，随后点击工具栏上的锚点图标。复制完成后，即可粘贴链接并分享给其他用户。</p>
