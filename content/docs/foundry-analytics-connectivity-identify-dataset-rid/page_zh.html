<p>要在第三方 BI 工具中处理 Foundry 数据，必须先指定目标数据集。部分第三方工具提供图形界面供用户浏览和选择数据集，另一些则要求直接输入目标数据集的相关信息。</p>
<p>Foundry 提供两种方式来指定数据集详情：</p>
<ul>
<li>"RID"，即数据集标识符</li>
<li>"位置"，用于指定数据集的文件路径位置</li>
</ul>
<p>在 Foundry 中，进入数据集的“关于”页面，点击“查看更多”，即可从左侧边栏复制“RID”值或“位置”。</p>
