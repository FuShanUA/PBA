<p><strong>血缘关系</strong>是一款交互式工具，能够帮助您全面了解数据在 Foundry 平台中流转的全貌。</p>
<p><img alt="Data Lineage flow animation" height="600" src="/docs/resources/foundry/data-lineage/data-lineage-flow.gif" style="aspect-ratio:1242 / 646" width="1153.5603715170278" node="[object Object]"></p>
<p>借助血缘关系，您可以：</p>
<ul>
<li>轻松查找并发现数据集
<ul>
<li>通过项目、表和列名称搜索数据集</li>
<li>点击浏览 Foundry 项目中的数据</li>
</ul>
</li>
<li>通过强大的界面探索流水线
<ul>
<li>展开或隐藏数据集的上游与下游节点</li>
<li>一次性查看一组数据表的属性</li>
<li>通过颜色标记直观展示流水线状态（例如将过期的数据表标红）</li>
<li>深入查看数据详情，包括其模式、最近构建时间以及生成该数据的代码</li>
</ul>
</li>
<li>与团队成员协作
<ul>
<li>创建流水线快照以分享给其他用户</li>
</ul>
</li>
</ul>
