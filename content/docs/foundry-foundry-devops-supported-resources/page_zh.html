<p>在<a href="/docs/foundry/foundry-devops/create-products/">创建产品</a>时，绝大多数 Foundry 资源类型都可以作为输出项包含在内。</p>
<p>有关各资源类型特定的打包限制和详细信息，请参阅该资源的 Marketplace 文档。例如，请查阅 <a href="/docs/foundry/action-types/marketplace-action-types/">操作类型</a> 或 <a href="/docs/foundry/automate/marketplace-automate/">自动化</a> 的 Marketplace 文档。</p>
<h2 id="user-content-unsupported-resources" level="2" node="[object Object]" data-pagefind-weight="0.9"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#unsupported-resources"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>不支持的资源</h2>
<p>如果某项资源不受支持，该资源将在草稿中显示错误。发布前必须从草稿中移除所有不支持的资源。可以通过使用 <strong>操作</strong> 下拉菜单并选择 <strong>丢弃所有打包失败项</strong> 来移除所有不支持的资源。</p>
