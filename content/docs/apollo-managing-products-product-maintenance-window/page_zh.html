<p>产品维护窗口（MW）是预定的重复时间段，在此期间Apollo可以执行维护操作，例如对跟踪产品的实体进行更改，或在发布通道之间提升产品的发布。</p>
<p>Apollo将根据实体声明的维护窗口和产品的维护窗口，为环境中的每个实体计算一个 <a href="/docs/apollo/core/plans-and-constraints/#how-apollo-calculates-an-entitys-resolved-maintenance-window">解析后的维护窗口</a>。</p>
<h2 id="user-content-defining-product-maintenance-windows" level="2" node="[object Object]" data-pagefind-weight="0.9"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#defining-product-maintenance-windows"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>定义产品维护窗口</h2>
<p>导航到产品 <strong>设置</strong> 页面中的产品 <strong>升级</strong> 选项卡。</p>
<p>使用 <strong>产品维护窗口</strong> 部分来定义在哪些日期和时间窗口内可以对跟踪产品的实体执行操作，如产品升级和配置更改。产品的发布自动提升只能在维护窗口期间发生。手动提升不受此 <a href="/docs/apollo/core/release-channels/#release-channel-promotion">配置</a> 的影响。</p>
