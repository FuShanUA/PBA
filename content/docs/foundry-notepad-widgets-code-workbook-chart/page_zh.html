<p>在 Code Workbook 中生成的可视化内容（如图片或 Plotly 图表），可以通过 <strong>Code Workbook chart</strong> 部分添加到文档中。</p>
<p>添加可视化内容最简单的方式是使用每个 Code Workbook 图表节点上提供的复制到记事本按钮。或者，也可以通过点击 + 添加组件，或在段落字段中输入 / 来打开组件插入菜单，从而添加该部分。</p>
