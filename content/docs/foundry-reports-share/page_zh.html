<p>要共享你的报告，请点击报告右上角的<strong>共享</strong>按钮：</p>
<p><img alt="Share button" height="50" src="/docs/resources/foundry/reports/howtos-share-a-report-share-a-report-share-button.png" style="aspect-ratio:100 / 50" width="100" node="[object Object]"></p>
<p>由于 Foundry 旨在保障任何敏感数据的安全，如果希望查看者能够看到这些内容，你还需要共享报告内部的资产。例如：</p>
<ul>
<li>如果报告包含<strong>图像</strong>或指向<strong>其他 Foundry 文件</strong>的链接，请确保报告查看者同时拥有这些文件的查看权限。</li>
<li>如果报告展示了来自特定<strong>数据集</strong>的信息，报告查看者需要具备该数据集的查看权限。</li>
</ul>
<h2 id="user-content-previewing" level="2" node="[object Object]" data-pagefind-weight="0.9"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#previewing"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>预览</h2>
<p>要预览他人收到报告后所看到的内容，你可以通过切换<strong>编辑/查看模式</strong>按钮来切换到阅读器模式：</p>
<p><img alt="Editing to viewing" height="175" src="/docs/resources/foundry/reports/howtos-share-a-report-share-a-report-editing-to-viewing.gif" style="aspect-ratio:272 / 175" width="272" node="[object Object]"></p>
<div class="ptcom-design__callout__19o1cwu"><svg class="ptcom-design__icon__19o1cwu" width="20" height="20" viewBox="0 0 20 20" role="img" fill="currentColor"><path d="M10,2a8,8,0,1,0,8,8A8,8,0,0,0,10,2Zm1,13H9V10H7V8h4ZM10,7a1,1,0,1,1,1-1A1,1,0,0,1,10,7Z"></path></svg><p>如果在共享报告及底层数据集/文件后，报告查看者仍无法查看报告内容，请使用<a href="/docs/foundry/data-lineage/overview/">数据血缘关系</a>应用程序来确定用户的资源访问权限。</p></div>
