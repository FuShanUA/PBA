<p>你可以通过 <a href="#submission-via-ui">用户界面 (UI)</a> 将模型提交至建模目标。</p>
<h2 id="user-content-submission-via-ui" level="2" node="[object Object]" data-pagefind-weight="0.9"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#submission-via-ui"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>通过用户界面提交</h2>
<p>若要将模型提交至新建的建模目标，请在目标主页点击蓝色的 <strong>提交模型</strong> 按钮：</p>
<img alt="Submission button" src="/docs/resources/foundry/manage-models/manage_submit-model-new.png?width=500" style="aspect-ratio:1245 / 308" width="500" node="[object Object]">
<p>或者，在已有的建模目标中，点击模型视图右上角的 <strong>提交模型</strong>。</p>
<img alt="Submission button" src="/docs/resources/foundry/manage-models/manage_submit-model-existing.png?width=500" style="aspect-ratio:1251 / 246" width="500" node="[object Object]">
<p>对于大多数模型（包括《模型资产》），请如图所示选择 <strong>模型</strong>，随后导航至并选中相关的模型资源。</p>
<img alt="Submission type" src="/docs/resources/foundry/manage-models/manage_submit-model-popover.png?width=500" style="aspect-ratio:1634 / 1402" width="500" node="[object Object]">
<p>最后，若适用，请填写《该目标所需的元数据》，并选择 <strong>提交</strong>。</p>
