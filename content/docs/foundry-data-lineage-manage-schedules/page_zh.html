<p>数据血缘关系支持在血缘图谱中便捷管理构建调度。在右侧边栏中，选择<strong>管理调度</strong>即可打开调度详情面板。</p>
<p><img alt="Manage schedules in Data Lineage" height="299" src="/docs/resources/foundry/data-lineage/manage-schedules.png" style="aspect-ratio:577 / 299" width="577" node="[object Object]"></p>
<p>界面会列出与图谱中所选数据集相关的调度。点击具体调度可查看更多详情：</p>
<p><img alt="Manage schedules details in Data Lineage sidebar" height="600" src="/docs/resources/foundry/data-lineage/manage-schedule-details.png" style="aspect-ratio:399 / 952" width="251.47058823529412" node="[object Object]"></p>
<ul>
<li><strong>最近运行：</strong>该调度最近一次运行的状态。</li>
<li><strong>最后更新：</strong>上次更新发生的时间戳以及执行变更的用户。</li>
<li><strong>目标数据集：</strong>包含在构建调度中的下游数据集列表。</li>
<li><strong>构建时机：</strong>展示创建构建调度时设定的触发条件。例如，可将构建调度设置为<strong>当特定数据集更新时</strong>运行。</li>
<li><strong>构建范围：</strong>定义纳入构建的 Project 或用户数据集，以及执行构建所用的权限。</li>
</ul>
<p>有关构建调度的更多信息，请参阅《构建管道》文档。</p>
