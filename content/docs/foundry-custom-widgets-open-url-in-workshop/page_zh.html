<h1 id="user-content-open-a-url-in-workshop" level="1" node="[object Object]" data-pagefind-weight="1"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#open-a-url-in-workshop"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>在 Workshop 中打开 URL</h1>
<p>要在 Workshop 中从自定义小部件打开 URL，发出一个 <a href="/docs/foundry/custom-widgets/parameters-and-events/">事件</a> 并在 Workshop 中配置它以作为副作用触发 <code>打开 URL</code> 的 Workshop 事件。</p>
<p>这可以是一个简单的静态字符串 URL，也可以是可能绑定到 <a href="/docs/foundry/custom-widgets/parameters-and-events/">参数</a> 并在同一自定义小部件事件中更新的字符串变量 URL。</p>
<div class="ptcom-design__callout__19o1cwu ptcom-design__warning__19o1cwu"><svg class="ptcom-design__icon__19o1cwu" width="20" height="20" viewBox="0 0 20 20" role="img" fill="currentColor"><path d="M11,2H9L2,15v2H18V15.5ZM10,15a1,1,0,1,1,1-1A1,1,0,0,1,10,15Zm1-3H9V6h2Z"></path></svg><p>请注意，异步变量可能在 <code>打开 URL</code> 事件运行之前不会更新。例如，作为自定义小部件事件的一部分直接更新字符串变量 URL 是同步的，但构建字符串变量 URL 的下游变量转换将是异步的。</p></div>
<p><img alt="&quot;打开 URL&quot; Workshop 事件配置。" height="600" src="/docs/resources/foundry/custom-widgets/workshop-open-url-event.png" style="aspect-ratio:666 / 950" width="420.6315789473684" node="[object Object]"></p>
<p>当打开外部 URL 时，可能会触发警告对话框。</p>
<p><img alt="Workshop 中的外部链接对话框。" height="518" src="/docs/resources/foundry/custom-widgets/workshop-open-external-link-dialog.png" style="aspect-ratio:1068 / 518" width="1068" node="[object Object]"></p>
