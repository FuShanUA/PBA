<p>Fusion 支持标准的电子表格公式（单元格引用、加法等）以及函数。Fusion 的函数库是 Contour 表达式语言 DSL 与 Fusion 专用电子表格函数的结合体。有关函数列表，请访问《函数库》。</p>
<p>在任意单元格中输入 <code>=</code> 即可使用公式。在公式栏中输入 <code>=a</code> 将为您提供候选建议列表。</p>
<p>浏览本节的其他页面以了解更多关于公式的信息：</p>
