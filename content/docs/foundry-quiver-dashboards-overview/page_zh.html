<p>Quiver 仪表板模式支持将分析洞察以只读的交互式仪表板呈现。仪表板既能作为独立视图使用，也可嵌入其他 Foundry 应用中。</p>
<h2 id="user-content-key-features" level="2" node="[object Object]" data-pagefind-weight="6.3"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#key-features"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>主要功能</h2>
<ul>
<li>支持为每项分析创建多个仪表板。</li>
<li>可从空白仪表板起步，将分析内容轻松拖拽至其中。</li>
<li>提供三种视图样式，方便优化仪表板，以适应独立查看或嵌入其他应用的需求。</li>
<li>仪表板可嵌入 Foundry 的其他模块，包括 <a href="/docs/foundry/quiver/dashboards-workshop/">Workshop 模块</a>、<a href="/docs/foundry/quiver/dashboards-notepad/">Notepad 文档</a>、<a href="/docs/foundry/quiver/dashboards-carbon/">Carbon 工作区</a>以及 <a href="/docs/foundry/quiver/dashboards-object-view/">对象视图</a>。</li>
</ul>
