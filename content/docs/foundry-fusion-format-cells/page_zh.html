<h1 id="user-content-format-cells" level="1" node="[object Object]" data-pagefind-weight="1"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#format-cells"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>设置单元格格式</h1>
<p>电子表格上方的格式工具栏提供了最常用的格式设置选项（如样式、数字/货币格式、冻结窗格等）。</p>
<p>条件格式结合 <code>lookup</code> 函数返回的动态数据使用时尤其实用，能够实现视图的动态变化。</p>
<p><img alt="conditional_formatting" height="597" src="/docs/resources/foundry/fusion/conditional_formatting.png" style="aspect-ratio:485 / 597" width="485" node="[object Object]"></p>
<p>还可以使用 <code>color</code> 函数，根据自定义逻辑为单元格添加样式。同样，使用 <code>tooltip</code> 函数可以在用户将鼠标悬停在单元格上时，显示自定义内容的提示框。</p>
<p><img alt="tooltip" height="426" src="/docs/resources/foundry/fusion/tooltip.png" style="aspect-ratio:1242 / 426" width="1242" node="[object Object]"></p>
<p>点击“文档”选项卡下的<strong>数字设置</strong>按钮，即可更改小数和千位分隔符。</p>
<p><img alt="numeric_settings" height="228" src="/docs/resources/foundry/fusion/numeric_settings.png" style="aspect-ratio:521 / 228" width="521" node="[object Object]"></p>
