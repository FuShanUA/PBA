<div class="ptcom-design__callout__19o1cwu ptcom-design__warning__19o1cwu"><svg class="ptcom-design__icon__19o1cwu" width="20" height="20" viewBox="0 0 20 20" role="img" fill="currentColor"><path d="M11,2H9L2,15v2H18V15.5ZM10,15a1,1,0,1,1,1-1A1,1,0,0,1,10,15Zm1-3H9V6h2Z"></path></svg><p>Foundry 表单已不再是 Foundry 上进行数据录入或数据回写工作流的推荐方案。请改用 Foundry 本体来构建用户输入工作流，将相关数据结构表示为对象类型，并通过动作配置数据回写交互。如需了解更多信息，请参阅《表单概述》文档。</p></div>
<p>创建表单后，您可以设置在每次提交后接收通知。</p>
<p>请按照以下步骤配置表单通知：</p>
<ol>
<li>
<p>首先，在编辑器模式下导航至该表单。</p>
</li>
<li>
<p>选择右上角的图标以显示<strong>详情</strong>面板。 <br><br>
<img alt="Open details pane to see followers" height="600" src="/docs/resources/foundry/forms/form-details-followers.png" style="aspect-ratio:696 / 1452" width="287.60330578512395" node="[object Object]"> <br><br></p>
</li>
<li>
<p>切换<strong>订阅</strong>开关，以便在发生更新时接收通知。</p>
</li>
</ol>
<p>当表单收到响应时，任何具有相应<a href="/docs/foundry/forms/permissions/">权限</a>的用户都可以在平台内访问生成的数据。</p>
