<p>工作区版本历史功能支持预览历史版本，可选择进行编辑并重新发布。若工作区配置更新引发错误，该功能可助您快速回退至已知可用的配置状态。</p>

<p>版本对话框用于查看版本元数据，可选择某一行以将对应版本设为预览状态。</p>
<p><img alt="Versions dialog" height="600" src="/docs/resources/foundry/carbon/workspace-configuration-version-history-versions-dialog.png" style="aspect-ratio:549 / 675" width="488" node="[object Object]"></p>

<p>选择配置编辑器顶部的<strong>版本</strong>按钮即可调出版本对话框。该按钮的文本会显示当前正在编辑的版本号。</p>
<p><img alt="Version button" height="92" src="/docs/resources/foundry/carbon/workspace-configuration-version-history-version-button.png" style="aspect-ratio:734 / 92" width="734" node="[object Object]"></p>
