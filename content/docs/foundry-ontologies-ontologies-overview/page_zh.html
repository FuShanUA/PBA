<p>本体论是一种用于存储本体资源或实体的工件，包括以下内容：</p>
<ul>
<li><a href="/docs/foundry/object-link-types/object-types-overview/">对象类型</a></li>
<li><a href="/docs/foundry/object-link-types/link-types-overview/">链接类型</a></li>
<li><a href="/docs/foundry/action-types/overview/">操作类型</a></li>
<li><a href="/docs/foundry/interfaces/interface-overview/">接口</a></li>
<li><a href="/docs/foundry/object-link-types/shared-property-overview/">共享属性</a></li>
<li><a href="/docs/foundry/object-link-types/type-groups/">对象类型组</a></li>
</ul>
<p>我们称这些资源为<strong>本体资源</strong>。一个本体可以是私有的，并分配给单个<a href="/docs/foundry/security/orgs-and-spaces/">组织</a>，也可以在多个组织之间共享。共享本体允许不同组织的用户安全地共享数据和工作流。在本体中对实体进行分组确保只有指定组织的用户才能访问本体实体。</p>
<h2 id="user-content-relation-with-spaces" level="2" node="[object Object]" data-pagefind-weight="6.3"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#relation-with-spaces"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>与空间的关系</h2>
<p>本体与一个 <a href="/docs/foundry/security/orgs-and-spaces/#spaces">空间</a> 一对一映射。当创建新空间时，会同时创建一个同名的本体，该本体具有与空间相同的组织 <a href="/docs/foundry/security/markings/">标记</a>。私有空间将映射到私有本体，而共享空间将映射到共享本体。</p>
