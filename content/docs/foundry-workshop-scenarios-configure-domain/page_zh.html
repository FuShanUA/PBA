<p><a href="/docs/foundry/workshop/scenarios-concepts/#domains">域</a>描述了可以对<a href="/docs/foundry/workshop/scenarios-concepts/#models">模型</a>进行评估的有效集合。如果您选择在场景中使用模型，为模型定义域非常重要。在场景管理器中，您可以选择模型并定义域。</p>
<p>对于<strong>模型</strong>，核心配置选项如下：</p>
<ul>
<li><strong>显示名称：</strong>模型的标题。</li>
<li><strong>模型：</strong>选择要与关联场景绑定的模型。</li>
<li><strong>域：</strong>选择对象集和过滤条件以确定模型域。请注意，域的对象类型应与选择器中显示的对象类型相匹配。</li>
</ul>
<p>了解有关<a href="/docs/foundry/model-integration/overview/">Foundry 中的建模</a>的更多信息。</p>
