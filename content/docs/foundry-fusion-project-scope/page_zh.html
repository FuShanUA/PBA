<p>在 Foundry 中，项目范围界定要求将某个资源的所有输入和输出放置在同一个项目中。</p>
<p>系统依然允许跨项目引用，但需接受更高程度的审查，且仅限特定用户执行。</p>
<p>若要引用某个资源，请前往项目根层级的“项目摘要面板”。点击 <strong>+添加</strong> 按钮即可为该项目添加引用。</p>
<p>为便于追踪此类信息，Fusion 在 <strong>数据</strong> 选项卡下提供了 <strong>项目范围设置</strong> 用户界面（见下图）。</p>
