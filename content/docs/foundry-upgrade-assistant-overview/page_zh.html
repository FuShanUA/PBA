<h1 id="user-content-upgrade-assistant" level="1" node="[object Object]" data-pagefind-weight="7"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#upgrade-assistant"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>升级助手</h1>
<p>升级助手可提供对即将进行的 <a href="/docs/foundry/upgrade-assistant/platform-changes/">平台变更</a> 的可见性。平台变更，如升级，在某些情况下可能导致现有工作流出现问题。</p>
<p>为了帮助适应平台变更，升级助手提供了 <a href="/docs/foundry/upgrade-assistant/impacted-resources/">受影响资源列表</a>，这些资源被确定为受到特定平台升级的影响。每次升级还附有解决受影响问题的说明。</p>
<p>为了确保采取行动，每个资源都会分配给用户和组。升级助手根据各种 <a href="/docs/foundry/upgrade-assistant/resource-assignment/">规则和启发式方法</a> 来确定资源的分配对象。</p>
<p>随着升级截止日期的临近，升级助手会向已被分配资源的用户发送 <a href="/docs/foundry/upgrade-assistant/notifications/">通知</a>，作为提醒以采取必要的操作，防止工作流中断。</p>
