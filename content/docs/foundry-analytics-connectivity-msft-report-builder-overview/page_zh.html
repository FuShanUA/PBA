<p>Foundry 与 Microsoft 报表生成器的集成提供以下功能：</p>
<ul>
<li>支持您在报表生成器中轻松创建由 Foundry 数据支撑的报表。</li>
<li>为桌面版提供与 Foundry 访问控制体系的兼容性，包括细粒度权限控制。</li>
<li>桌面版支持基于令牌的身份验证。</li>
</ul>
