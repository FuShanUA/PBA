<p>通过 Apollo 在用户界面中进行上下文操作可以执行许多类型的变更。以下每个操作都可以通过 <strong>配置</strong> 选项卡在环境上访问，并打开不同类型的变更请求。</p>
<p><img alt="变更类型" height="545" src="/docs/resources/apollo/managing-changes/change_types.png" style="aspect-ratio:945 / 545" width="945" node="[对象 对象]"></p>
<p>对安装配置的变更请求很常见。服务操作员可以看到为所有配置变更提供的逐行“diff”视图。</p>
<p><img alt="配置变更示例" height="230" src="/docs/resources/apollo/managing-changes/configuration_change_example.png" style="aspect-ratio:1127 / 230" width="1127" node="[对象 对象]"></p>
<p>设置和权限变更是 Apollo 平台内的另一种变更请求来源。</p>
<p>对环境、产品或其他由 Apollo 支持的概念的现有设置进行更改，可以由该特定设置的管理员批准。对于引入新设置的变更，例如创建新的发布渠道，需要一个特定上下文的管理员组来批准该设置的添加。</p>
<p><img alt="权限变更" height="600" src="/docs/resources/apollo/managing-changes/permissions_change.png" style="aspect-ratio:414 / 677" width="366.91285081240767" node="[对象 对象]"></p>
