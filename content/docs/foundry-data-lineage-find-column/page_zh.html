<h1 id="user-content-find-datasets-with-a-given-column" level="1" node="[object Object]" data-pagefind-weight="1"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#find-datasets-with-a-given-column"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>查找包含特定列的数据集</h1>
<p>您可以在数据血缘关系图中轻松搜索特定的数据集列：</p>
<ul>
<li>
<p>首先，确保已将管道中所有关注的数据集添加到血缘关系图中。</p>
</li>
<li>
<p>接下来，使用应用左上角工具切换栏中的<strong>拖拽选择模式</strong>选择所有关注的数据集。您也可以按住 <code>Ctrl / Command</code> 同时选择多个节点，或使用 <code>Ctrl / Command + A</code> 选择所有节点。<br><br>
<img alt="Select datasets with Select mode" height="142" src="/docs/resources/foundry/data-lineage/select-mode.png" style="aspect-ratio:450 / 142" width="450" node="[object Object]"> <br><br></p>
</li>
<li>
<p>然后，从数据血缘关系侧边栏中选择<strong>查看所选属性的直方图</strong>。<br><br>
<img alt="View histogram of selection properties" height="412" src="/docs/resources/foundry/data-lineage/view-histogram.png" style="aspect-ratio:672 / 412" width="672" node="[object Object]"> <br><br></p>
</li>
<li>
<p>在<strong>常用列</strong>区域下，您可以按名称查看所选数据集中最常出现的列。</p>
</li>
<li>
<p>点击其中一个列，即可高亮显示所选数据集中包含该列的数据集。<br><br>
<img alt="View frequent columns in histogram" height="307" src="/docs/resources/foundry/data-lineage/column-search-dataset.png" style="aspect-ratio:1126 / 307" width="1126" node="[object Object]"> <br><br></p>
</li>
</ul>
</article>
