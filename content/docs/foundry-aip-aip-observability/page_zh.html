<p>AIP 可观测性是指 <a href="/docs/foundry/workflow-lineage/overview/">工作流血缘</a> 中的一组功能，这些功能可以为您提供 AIP 和 本体论 工作流执行的可见性，包括 <a href="/docs/foundry/aip-observability/metrics/">指标</a>、<a href="/docs/foundry/aip-observability/run-history/">执行历史</a>、<a href="/docs/foundry/aip-observability/trace-view/">分布式追踪</a>、<a href="/docs/foundry/aip-observability/service-logs-and-debugging/">日志记录</a> 和 <a href="/docs/foundry/aip-observability/log-search/">日志搜索</a>。这些功能是 Palantir 的 <a href="/docs/foundry/observability/overview/">平台级可观测性</a> 策略的一部分。</p>
<p>要了解可用工具以及如何开始使用，请参阅 <a href="/docs/foundry/aip-observability/overview/">AIP 可观测性部分</a>。</p>
