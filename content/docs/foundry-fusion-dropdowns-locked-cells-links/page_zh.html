<h1 id="user-content-dropdowns-locked-cells-and-links" level="1" node="[object Object]" data-pagefind-weight="1"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#dropdowns-locked-cells-and-links"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>下拉菜单、锁定单元格与链接</h1>
<p>在 Fusion 电子表格中，可以使用 <code>dropdown</code> 和 <code>multidropdown</code> 函数将任意单元格转换为下拉菜单（例如 <code>=dropdown(array(1,2,3))</code>）。<code>dropdown</code> 函数还提供其他可选参数，可在《函数库》中查阅，以便自定义其行为。</p>
<p><img alt="dropdown" height="186" src="/docs/resources/foundry/fusion/dropdown.png" style="aspect-ratio:517 / 186" width="517" node="[object Object]"></p>
<p>在共享的电子表格中，您可以锁定任意单元格区域，以防发生误编辑。一旦锁定，任何用户若要再次编辑该单元格，均需先解除锁定状态。</p>
<p><img alt="cell_locking" height="223" src="/docs/resources/foundry/fusion/cell_locking.png" style="aspect-ratio:285 / 223" width="285" node="[object Object]"></p>
<p>利用 <code>url</code> 函数，您可以在电子表格的任意单元格中创建链接。如果需要为复杂的 URL 进行字符串格式化，可以借助 <code>url_encode</code> 和 <code>query_params</code> 函数来完成。</p>
